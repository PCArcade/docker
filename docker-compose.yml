services:
  sonarr:
    image: ghcr.io/linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=022
    volumes:
      - ${CONF}/sonarr:/config
      - ${MEDIA}:/media
    restart: ${RESTART_POLICY}

  radarr:
    image: ghcr.io/linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=022
    volumes:
      - ${CONF}/radarr:/config
      - ${MEDIA}:/media
    restart: ${RESTART_POLICY}

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONF}/prowlarr:/config
    restart: ${RESTART_POLICY}

  swag:
    image: ghcr.io/linuxserver/swag
    container_name: swag
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - URL=${URL}
      - SUBDOMAINS=wildcard
      - VALIDATION=dns
      - DNSPLUGIN=${DNS}
      - MAXMINDDB_LICENSE_KEY=${MAXMIND}
      - EMAIL=${EMAIL}
      - SWAG_AUTORELOAD=true
    volumes:
      - ${CONF}/swag:/config
    ports:
      - 443:443
    restart: ${RESTART_POLICY}

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    ports:
      - "8191:8191"
    environment:
      - LOG_LEVEL=info
    restart: ${RESTART_POLICY}

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    shm_size: '20gb'
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
    devices:
      - /dev/dri/:dev/dri/
    volumes:
      - ${CONF}/plex:/config
      - ${MEDIA}:/media
      - ${TRANSCODE}:/transcode
    restart: ${RESTART_POLICY}

