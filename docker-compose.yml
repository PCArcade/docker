services:
  sonarr:
    image: ghcr.io/linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=022
    volumes:
      - ${CONF}/sonarr:/config
      - ${MEDIA}:/media
    restart: ${RESTART_POLICY}

  radarr:
    image: ghcr.io/linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=022
    volumes:
      - ${CONF}/radarr:/config
      - ${MEDIA}:/media
    restart: ${RESTART_POLICY}

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONF}/prowlarr:/config
    restart: ${RESTART_POLICY}

  swag:
    image: ghcr.io/linuxserver/swag
    container_name: swag
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - URL=${URL}
      - SUBDOMAINS=wildcard
      - VALIDATION=dns
      - DNSPLUGIN=${DNS}
      - MAXMINDDB_LICENSE_KEY=${MAXMIND}
      - EMAIL=${EMAIL}
      - SWAG_AUTORELOAD=true
    volumes:
      - ${CONF}/swag:/config
    ports:
      - 443:443
    restart: ${RESTART_POLICY}

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    hostname: PCAPlex
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
    devices:
      - /dev/dri:/dev/dri   # Fixed minor typo inside original device mapping
    volumes:
      - ${CONF}/plex:/config
      - ${MEDIA}:/media
    tmpfs:
      - /transcode:size=24G,mode=1777,uid=${PUID},gid=${PGID}
    restart: ${RESTART_POLICY}

  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=022
    volumes:
      - ${CONF}/nzbget:/config
      - ${MEDIA}/usenet:/media/usenet
      - ${P2P}:/mnt/ssd001/p2p
      - ${MEDIA}/usenet/.watch:/watched
      - ${STORAGE}:/Storage
    restart: ${RESTART_POLICY}

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
      - UMASK=022
    volumes:
      - ${CONF}/qbittorrent:/config
      - ${MEDIA}/torrents:/media/torrents
      - /mnt/merged/Storage:/Storage
      - /mnt/ssd001/p2p:/mnt/ssd001/p2p
    restart: ${RESTART_POLICY}

  archisteamfarm:
    image: ghcr.io/justarchinet/archisteamfarm
    container_name: archisteamfarm
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONF}/asf:/app/config
      - ${CONF}/asf/plugins:/app/plugins
    healthcheck:
      disable: true
    restart: ${RESTART_POLICY}

  tautulli:
    image: ghcr.io/tautulli/tautulli
    container_name: tautulli
    volumes:
      - ${CONF}/tautulli:/config
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    healthcheck:
      disable: true
    restart: ${RESTART_POLICY}

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - PORT=5090 #optional
    volumes:
      - ${CONF}/seerr:/app/config
    restart: ${RESTART_POLICY}

  maintainerr:
    image: ghcr.io/maintainerr/maintainerr:latest
    container_name: maintainerr
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
#     - DEBUG=true # uncomment (remove the hashtag) to enable debug logs
    volumes:
       - type: bind
         source: ${CONF}/maintainerr
         target: /opt/data
    restart: ${RESTART_POLICY}

  unpackerr:
    image: golift/unpackerr
    container_name: unpackerr
    volumes:
      - ${MEDIA}:/media
      - ${CONF}/unpackerr:/config
    restart: ${RESTART_POLICY}
    user: ${PUID}:${PGID}
    environment:
      - UMASK=022
      - TZ=${TZ}
      ## Global Settings
      - UN_DEBUG=false
      - UN_QUIET=false
      - UN_ERROR_STDERR=false
      - UN_ACTIVITY=false
      - UN_LOG_QUEUES=1m
      - UN_LOG_FILE=/config/unpackerr
      - UN_LOG_FILES=10
      - UN_LOG_FILE_MB=10
      - UN_INTERVAL=2m
      - UN_START_DELAY=1m
      - UN_RETRY_DELAY=5m
      - UN_MAX_RETRIES=3
      - UN_PARALLEL=1
      - UN_FILE_MODE=0644
      - UN_DIR_MODE=0755
      ## Web Server
      - UN_WEBSERVER_METRICS=true
      - UN_WEBSERVER_LISTEN_ADDR=0.0.0.0:5656
      - UN_WEBSERVER_LOG_FILE=
      - UN_WEBSERVER_LOG_FILES=10
      - UN_WEBSERVER_LOG_FILE_MB=10
      - UN_WEBSERVER_SSL_CERT_FILE=
      - UN_WEBSERVER_SSL_KEY_FILE=
      - UN_WEBSERVER_URLBASE=/
      - UN_WEBSERVER_UPSTREAMS=
      ## Folder Settings
      - UN_FOLDERS_INTERVAL=1s
      - UN_FOLDERS_BUFFER=20000
      ## Sonarr Settings
      - UN_SONARR_0_URL=https://sonarr.pcarcade.co.uk
      - UN_SONARR_0_API_KEY=${SONARRAPI}
      - UN_SONARR_0_PATHS_0=/media
      - UN_SONARR_0_PROTOCOLS=torrent,usenet
      - UN_SONARR_0_TIMEOUT=10s
      - UN_SONARR_0_DELETE_DELAY=5m
      - UN_SONARR_0_DELETE_ORIG=false
      - UN_SONARR_0_SYNCTHING=false
      ## Radarr Settings
      - UN_RADARR_0_URL=https://radarr.pcarcade.co.uk
      - UN_RADARR_0_API_KEY=${RADARRAPI}
      - UN_RADARR_0_PATHS_0=/media
      - UN_RADARR_0_PROTOCOLS=torrent,usenet
      - UN_RADARR_0_TIMEOUT=10s
      - UN_RADARR_0_DELETE_DELAY=5m
      - UN_RADARR_0_DELETE_ORIG=false
      - UN_RADARR_0_SYNCTHING=false

  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    group_add:
      - "989"  # Replace with your host's Docker GID
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/pcarcade/.config/dockhand:/app/data

volumes:
  dockhand_data:
